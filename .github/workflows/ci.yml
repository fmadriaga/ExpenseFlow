name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - run: dotnet restore ExpenseFlow.sln

      - run: dotnet build ExpenseFlow.sln -c Release --no-restore

      - run: dotnet test ExpenseFlow.sln -c Release --no-build --logger "console;verbosity=normal"
